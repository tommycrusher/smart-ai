name: Weekly CN Task

on:
  schedule:
    # Runs at 8/9:30 AM PST (16:30 UTC) every Monday so PR shows up at beginning of week
    - cron: "30 16 * * 1"
  workflow_dispatch: # Allows manual triggering

jobs:
  run-cn-task:
    # Only run this workflow on the main repository (tommycrusher/smart-ai)
    if: github.repository == 'tommycrusher/smart-ai'
    uses: ./.github/workflows/run-smartai-agent.yml
    with:
      agent: continuedev/tidy-up-markdown-agent
      branch_name: main
    secrets:
      SMARTAI_API_KEY: ${{ secrets.SMARTAI_API_KEY }}
